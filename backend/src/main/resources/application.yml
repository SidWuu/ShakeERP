logging:
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss:SSS

server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:../data/factory-erp.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

app:
  upload-dir: ../uploads

spring.devtools:
  restart:
    enabled: true
    poll-interval: 2s
    quiet-period: 1s

